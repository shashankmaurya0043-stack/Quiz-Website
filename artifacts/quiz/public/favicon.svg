<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF95B"/>
      <stop offset="100%" stop-color="#E6A100"/>
    </linearGradient>

    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE94A"/>
      <stop offset="100%" stop-color="#B86B00"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Rounded Square -->
  <rect x="40" y="40" width="432" height="432" rx="70"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Outer Ring -->
  <circle cx="256" cy="240" r="145"
          fill="#111"
          stroke="url(#ring)"
          stroke-width="16"/>

  <!-- Inner Ring -->
  <circle cx="256" cy="240" r="132"
          fill="none"
          stroke="#FFD400"
          stroke-width="6"/>

  <!-- O -->
  <text x="256" y="220"
        text-anchor="middle"
        font-size="130"
        font-family="Arial"
        font-weight="bold"
        fill="#FFD400">
    O
  </text>

  <!-- Level -->
  <text x="256" y="315"
        text-anchor="middle"
        font-size="64"
        font-family="Arial"
        font-weight="bold"
        fill="#FFD400">
    Level
  </text>

</svg>
